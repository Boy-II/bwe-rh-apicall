services:
  postgres:
    image: postgres:16-alpine
    container_name: rhapi-postgres
    environment:
      POSTGRES_USER: rhapi
      POSTGRES_PASSWORD: rhapi_local_dev
      POSTGRES_DB: rhapi
    ports:
      - "5433:5432"
    volumes:
      - rhapi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhapi -d rhapi"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rhapi-redis
    ports:
      - "6380:6379"
    volumes:
      - rhapi_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  rhapi_pg_data:
  rhapi_redis_data:
